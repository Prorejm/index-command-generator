<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>食指指令生成器 · 月亮计划</title>
<style>
/* ========== RESET & BASE ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{
  min-height:100svh;
  background:#0a0a0c;
  font-family:'Noto Serif SC','Source Han Serif SC','SimSun','Songti SC',serif;
  display:flex;flex-direction:column;align-items:center;
  overflow-x:hidden;color:#d4c9b0;
  position:relative;
}

/* ========== AMBIENT BG ========== */
body::before{
  content:'';position:fixed;inset:0;
  background:url('city-bg.png') center/cover no-repeat;
  filter:grayscale(0.7) brightness(0.25) contrast(1.1);
  z-index:-2;
}
body::after{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%, rgba(20,15,10,0.6), transparent),
    radial-gradient(ellipse 60% 40% at 50% 100%, rgba(5,3,2,0.8), transparent),
    repeating-linear-gradient(0deg, transparent, transparent 120px, rgba(0,0,0,0.08) 120px, rgba(0,0,0,0.08) 121px);
  z-index:-1;
}

/* ========== FLOATING PARTICLES ========== */
.particle-field{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.particle{
  position:absolute;width:2px;height:2px;background:rgba(210,195,165,0.25);border-radius:50%;
  animation:drift linear infinite;
}
@keyframes drift{
  0%{transform:translateY(100vh) translateX(0);opacity:0}
  10%{opacity:1}
  90%{opacity:0.3}
  100%{transform:translateY(-10vh) translateX(40px);opacity:0}
}

/* ========== HEADER ========== */
header{
  position:relative;z-index:2;width:100%;
  padding:2rem 1rem 1rem;text-align:center;
}
header h1{
  font-size:clamp(1.6rem,4vw,2.8rem);
  font-weight:700;letter-spacing:0.6em;
  background:linear-gradient(180deg,#e8ddd0 0%,#b8a58e 80%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  text-shadow:none;margin-bottom:0.2rem;
}
header .sub{
  font-size:clamp(0.7rem,1.6vw,0.85rem);
  color:rgba(180,165,140,0.5);letter-spacing:0.3em;
}

/* ========== MAIN CARD ========== */
main{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;padding:1.5rem 1rem 2rem}

/* ========== PAPER CONTAINER ========== */
.paper-wrapper{
  position:relative;width:100%;max-width:640px;
  filter:drop-shadow(0 8px 60px rgba(0,0,0,0.7));
  transition:filter .4s;
}
.paper-wrapper:hover{filter:drop-shadow(0 8px 80px rgba(0,0,0,0.8))}

.paper{
  position:relative;
  background:linear-gradient(170deg, #f5efe0 0%, #ede3cf 40%, #e6dcc5 60%, #f0e6d2 100%);
  border-radius:2px;
  padding:2.8rem 2.2rem 2.2rem;
  min-height:420px;
  display:flex;flex-direction:column;
  box-shadow:inset 0 0 30px rgba(160,130,90,0.1);
  transition:opacity .35s, transform .35s;
}
.paper.fade-out{
  opacity:0;transform:scale(0.97) translateY(6px);
}

/* Paper edge aging */
.paper::before{
  content:'';position:absolute;inset:0;
  border-radius:2px;
  background:linear-gradient(135deg, rgba(120,90,60,0.08) 0%, transparent 30%, transparent 70%, rgba(120,90,60,0.06) 100%);
  pointer-events:none;
}

/* ========== INDEX SEAL ========== */
.seal-top{
  position:absolute;top:-16px;left:50%;transform:translateX(-50%);
  width:60px;height:60px;
  background:radial-gradient(circle at 50% 40%, #8b2020 0%, #5a1212 70%, #3a0808 100%);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;color:#d4a060;font-weight:700;
  box-shadow:0 2px 12px rgba(100,20,0,0.5);
  border:1px solid rgba(180,100,50,0.3);
  z-index:3;
  letter-spacing:0.1em;
}

/* ========== INSTRUCTION CONTENT ========== */
.instruction-content{position:relative;z-index:1;flex:1;display:flex;flex-direction:column}

.instruction-header{
  text-align:center;margin-bottom:1.4rem;
  font-size:clamp(1rem,2.5vw,1.3rem);
  font-weight:700;color:#3a2a1a;
  letter-spacing:0.5em;
}
.instruction-header .deco{
  display:block;margin-top:4px;
  font-size:0.7rem;letter-spacing:0.3em;color:#a08870;font-weight:400;
}

.instruction-body{
  flex:1;
  font-size:clamp(0.95rem,2.2vw,1.15rem);
  line-height:2;
  color:#3a3024;
  padding:0.4rem 0;
}
.instruction-body p{
  margin-bottom:0.8rem;
  text-indent:2em;
}
.instruction-body .highlight{
  color:#7a3020;font-weight:700;
}

.instruction-footer{
  margin-top:auto;padding-top:1.2rem;
  display:flex;justify-content:space-between;align-items:flex-end;
  border-top:1px solid rgba(60,40,20,0.12);
}
.instruction-footer .mark{
  font-size:0.75rem;color:#8a7058;letter-spacing:0.1em;
}
.instruction-footer .seal-stamp{
  width:48px;height:48px;
  background:radial-gradient(circle at 50% 40%, #8b2020 0%, #5a1212 70%);
  border-radius:4px;opacity:0.7;
  display:flex;align-items:center;justify-content:center;
  font-size:0.6rem;color:#d4a060;writing-mode:vertical-lr;letter-spacing:0.2em;
  transform:rotate(-3deg);
  box-shadow:inset 0 0 8px rgba(0,0,0,0.3);
}

/* ========== CONTROLS ========== */
.controls{
  margin-top:2.2rem;display:flex;gap:1rem;justify-content:center;
  flex-wrap:wrap;
}
.btn{
  padding:0.7rem 2rem;
  background:linear-gradient(135deg, #3a2a1a 0%, #2a1a0a 100%);
  color:#d4c9b0;border:1px solid rgba(200,170,130,0.25);
  border-radius:2px;
  font-size:0.9rem;font-family:inherit;letter-spacing:0.15em;
  cursor:pointer;transition:all .3s;
}
.btn:hover{
  background:linear-gradient(135deg, #5a3a2a 0%, #3a2a1a 100%);
  border-color:rgba(200,170,130,0.4);
  transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,0.4);
}
.btn:active{transform:translateY(0)}
.btn-secondary{
  background:transparent;
  border-color:rgba(200,170,130,0.15);
  color:rgba(180,165,140,0.6);
}
.btn-secondary:hover{
  background:rgba(200,170,130,0.05);
  border-color:rgba(200,170,130,0.25);
  color:rgba(200,180,160,0.8);
}

/* ========== COUNTER ========== */
.counter{
  margin-top:1rem;font-size:0.75rem;color:rgba(180,165,140,0.35);
  letter-spacing:0.05em;
  text-align:center;
}

/* ========== FOOTER ========== */
footer{
  position:relative;z-index:2;width:100%;
  padding:1.5rem 1rem;text-align:center;
  font-size:0.65rem;color:rgba(180,165,140,0.2);letter-spacing:0.1em;
}

/* ========== RESPONSIVE ========== */
@media(max-width:480px){
  .paper{padding:2rem 1.2rem 1.5rem;min-height:360px}
  .instruction-body{font-size:0.95rem;line-height:1.9}
  .btn{padding:0.6rem 1.4rem;font-size:0.8rem}
}

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:rgba(10,10,12,0.5)}
::-webkit-scrollbar-thumb{background:rgba(100,80,60,0.3);border-radius:2px}
</style>
</head>
<body>

<div class="particle-field" id="particles"></div>

<header>
  <h1>指 令 生 成 器</h1>
  <div class="sub">— 食 指 · 都 市 之 令 —</div>
</header>

<main>
  <div class="paper-wrapper">
    <div class="paper" id="paper">
      <div class="seal-top">食</div>
      <div class="instruction-content" id="instruction">
        <!-- generated by JS -->
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="generateBtn">⟳ 降下新指令</button>
    <button class="btn btn-secondary" id="copyBtn">◻ 复录指令</button>
  </div>
  <div class="counter" id="counter"></div>
</main>

<footer>「谨遵指令之意」— 指令无需知晓来源，只需践行其意志。</footer>

<script>
// ============================================================
//  INGREDIENTS – 部件库，可组合出上万种不同指令
// ============================================================

const OPENINGS = [
  '谨遵指令之意：',
  '食指之令已至：',
  '信纸所示，不可违逆：',
  '意志既定，遵从便是：',
  '今有指令如下：',
  '奉行意志：',
  '信之所至：',
];

const ACTIONS = [
  '前往', '交付', '寻找', '携带', '守护',
  '摧毁', '收集', '拜访', '传递', '清除',
  '献上', '点燃', '掩埋', '悬挂', '投掷',
];

const TARGETS = [
  '三枚染血的硬币', '七根未燃的白烛', '一封无字的信函',
  '一束枯萎的蓝花', '一面破碎的银镜', '一块染墨的白布',
  '一把生锈的铁匙', '三片漆黑的鸦羽', '一本空心的古书',
  '一枚铜铸的铃铛', '一双沾泥的皮靴', '一叠写满字的纸片',
  '一条断开的银链', '半截烧残的蜡烛', '一枝带刺的黑玫瑰',
  '一只独眼的瓷猫', '一块刻字的骨牌', '一枚泛黄的旧照',
  '一个密封的陶罐', '一卷泛霉的绷带',
];

const PERSONS = [
  '穿红大衣的老者', '独眼的卖花女童', '断指的铁匠',
  '蒙面的夜巡人', '跛脚的邮差', '沉默的白袍修女',
  '戴鸟面面具的人', '缺牙的巷口乞丐', '满臂纹身的醉汉',
  '缠绷带的怪医', '提灯笼的盲眼少年', '扛棺的驼背人',
  '戴单片眼镜的绅士', '披破斗篷的瘦高人影',
];

const LOCATIONS = [
  'K巢第七后巷的旧铁桥下', 'L巢西南区废弃缆车站',
  '八号巷"音之巷"的废弃剧场', '二十三号巷"味之巷"第三岔口',
  'W公司裂口站的月台尽头', 'M公司月长石诊所后院',
  'N公司自贩机广场东南角', 'T公司褪色区钟楼废墟',
  'U公司大湖码头废弃货舱', 'R公司第五征兵站旧址',
  'L巢应试村南侧枯井旁', 'T巢与K巢交界的高架桥洞',
  'Cinq协会南部别馆地下', 'Zwei协会北部第七哨站废墟',
  'S公司肉血骨工厂三号烟囱底部',
];

const TIMES = [
  '今晚深宵之前', '明早日出之时', '三日之内',
  '下一个月圆之夜', '七声钟响之内', '日落之前',
  '清道夫出动以前', '下一轮深宵到来前',
  '三日后凌晨三点十三分', '七日后的正午',
];

const CONDITIONS = [
  '不得被人察觉', '不得与他人交谈', '不得留下任何痕迹',
  '必须独自完成', '不得使用任何奇点制品',
  '全程不可点灯', '不可回头张望', '需赤足而行',
  '需蒙眼前往', '需以左手行事',
];

const CONSEQUENCES = [
  '违者将化为"材料"', '违者将录入名录，永世追索',
  '违者将失去居住之权', '违者将受"清道夫"问候',
  '违者之姓名将从都市中抹去', '违者将被逐出后巷，流放郊区',
  '违者之血将被献于意志', '违者将永失食指庇护',
];

const CLOSINGS = [
  '——遵行即安，违者无赦。',
  '——信在人在，信失人亡。',
  '——意志既降，莫问缘由。',
  '——此令既出，天地共鉴。',
  '——食指引以为证。',
];

// ============================================================
//  GENERATOR
// ============================================================

function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}

function generateIndex(){
  const o    = pick(OPENINGS);
  const act  = pick(ACTIONS);
  const tgt  = pick(TARGETS);
  const per  = pick(PERSONS);
  const loc  = pick(LOCATIONS);
  const time = pick(TIMES);
  const cond = pick(CONDITIONS);
  const cons = pick(CONSEQUENCES);
  const clos = pick(CLOSINGS);

  // 随机决定这条指令的结构：3 种句式
  const variant = Math.random();
  let para1, para2, para3;

  if(variant < 0.33){
    // 句式A：前往某处做某事
    para1 = `${o}${act}${loc}，向${per}索取${tgt}。`;
    para2 = `${time}前完成，${cond}。`;
    para3 = `${cons}。${clos}`;
  } else if(variant < 0.66){
    // 句式B：寻找某人/某物并处置
    para1 = `${o}在${loc}寻找${per}，从其手中取得${tgt}。`;
    para2 = `限${time}，${cond}。`;
    para3 = `${cons}。${clos}`;
  } else {
    // 句式C：将某物送到某处
    para1 = `${o}将${tgt}${act}至${loc}，交予${per}。`;
    para2 = `须在${time}抵达，${cond}。`;
    para3 = `${cons}。${clos}`;
  }

  return {para1, para2, para3, clos};
}

// ============================================================
//  RENDER
// ============================================================

const paper  = document.getElementById('paper');
const instEl = document.getElementById('instruction');
const cntEl  = document.getElementById('counter');
let genCount = 0;

function renderIndex(){
  const {para1, para2, para3} = generateIndex();

  // fade out
  paper.classList.add('fade-out');

  setTimeout(()=>{
    instEl.innerHTML = `
      <div class="instruction-header">
        食 指 之 令
        <span class="deco">⋆ 谨遵指令之意 ⋆</span>
      </div>
      <div class="instruction-body">
        <p>${para1}</p>
        <p>${para2}</p>
        <p>${para3}</p>
      </div>
      <div class="instruction-footer">
        <span class="mark">都市历 · 未知年 · 信纸编号 ${String(++genCount).padStart(4,'0')}</span>
        <div class="seal-stamp">食指</div>
      </div>
    `;
    cntEl.textContent = `已降指令 ${genCount} 道 · 可组合逾万种`;
    paper.classList.remove('fade-out');
  }, 280);
}

// ============================================================
//  COPY
// ============================================================

document.getElementById('copyBtn').addEventListener('click', async ()=>{
  const text = instEl.innerText;
  try{
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('copyBtn');
    const orig = btn.textContent;
    btn.textContent = '✓ 已复录';
    setTimeout(()=>btn.textContent = orig, 1200);
  }catch{
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  }
});

// ============================================================
//  EVENTS
// ============================================================

document.getElementById('generateBtn').addEventListener('click', renderIndex);
document.addEventListener('keydown', e=>{
  if(e.key===' '||e.key==='Space'){e.preventDefault(); renderIndex()}
});

// ============================================================
//  PARTICLES
// ============================================================

(function initParticles(){
  const field = document.getElementById('particles');
  for(let i=0;i<35;i++){
    const p = document.createElement('div'); p.className='particle';
    p.style.left   = Math.random()*100+'%';
    p.style.width  = p.style.height = (1+Math.random()*2)+'px';
    p.style.animationDuration = (12+Math.random()*25)+'s';
    p.style.animationDelay = (Math.random()*20)+'s';
    p.style.opacity = 0.15+Math.random()*0.25;
    field.appendChild(p);
  }
})();

// ============================================================
//  BOOT
// ============================================================

renderIndex();
</script>
</body>
</html>
