<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>食指指令生成器 · 月亮计划</title>
<style>
/* ========== RESET & BASE ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{
  min-height:100svh;
  background:#0a0a0c;
  font-family:'Noto Serif SC','Source Han Serif SC','SimSun','Songti SC',serif;
  display:flex;flex-direction:column;align-items:center;
  overflow-x:hidden;color:#d4c9b0;
  position:relative;
}

/* ========== AMBIENT BG ========== */
body::before{
  content:'';position:fixed;inset:0;
  background:url('city-bg.png') center/cover no-repeat;
  filter:grayscale(0.7) brightness(0.25) contrast(1.1);
  z-index:-2;
}
body::after{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%, rgba(20,15,10,0.6), transparent),
    radial-gradient(ellipse 60% 40% at 50% 100%, rgba(5,3,2,0.8), transparent),
    repeating-linear-gradient(0deg, transparent, transparent 120px, rgba(0,0,0,0.08) 120px, rgba(0,0,0,0.08) 121px);
  z-index:-1;
}

/* ========== FLOATING PARTICLES ========== */
.particle-field{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.particle{
  position:absolute;width:2px;height:2px;background:rgba(210,195,165,0.25);border-radius:50%;
  animation:drift linear infinite;
}
@keyframes drift{
  0%{transform:translateY(100vh) translateX(0);opacity:0}
  10%{opacity:1}
  90%{opacity:0.3}
  100%{transform:translateY(-10vh) translateX(40px);opacity:0}
}

/* ========== HEADER ========== */
header{
  position:relative;z-index:2;width:100%;
  padding:2rem 1rem 0.6rem;text-align:center;
}
header h1{
  font-size:clamp(1.6rem,4vw,2.8rem);
  font-weight:700;letter-spacing:0.6em;
  background:linear-gradient(180deg,#e8ddd0 0%,#b8a58e 80%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  text-shadow:none;margin-bottom:0.2rem;
}
header .sub{
  font-size:clamp(0.7rem,1.6vw,0.85rem);
  color:rgba(180,165,140,0.5);letter-spacing:0.3em;
}

/* ========== STYLE TABS ========== */
.style-tabs{
  position:relative;z-index:2;
  display:flex;gap:0.3rem;justify-content:center;flex-wrap:wrap;
  padding:0.8rem 1rem 0.3rem;
}
.style-tab{
  padding:0.4rem 0.9rem;
  background:rgba(30,20,10,0.5);
  border:1px solid rgba(200,170,130,0.12);
  border-radius:2px;
  color:rgba(180,165,140,0.5);
  font-size:0.75rem;font-family:inherit;letter-spacing:0.1em;
  cursor:pointer;transition:all .3s;
}
.style-tab:hover{
  border-color:rgba(200,170,130,0.25);
  color:rgba(200,180,160,0.7);
}
.style-tab.active{
  background:rgba(60,35,20,0.4);
  border-color:rgba(180,100,50,0.35);
  color:#c8b090;
}

/* ========== MAIN CARD ========== */
main{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;padding:0.6rem 1rem 1.5rem}

/* ========== PAPER CONTAINER ========== */
.paper-wrapper{
  position:relative;width:100%;max-width:640px;
  filter:drop-shadow(0 8px 60px rgba(0,0,0,0.7));
  transition:filter .4s;
}
.paper-wrapper:hover{filter:drop-shadow(0 8px 80px rgba(0,0,0,0.8))}

.paper{
  position:relative;
  background:linear-gradient(170deg, #f5efe0 0%, #ede3cf 40%, #e6dcc5 60%, #f0e6d2 100%);
  border-radius:2px;
  padding:2.8rem 2.2rem 2.2rem;
  min-height:400px;
  display:flex;flex-direction:column;
  box-shadow:inset 0 0 30px rgba(160,130,90,0.1);
  transition:opacity .35s, transform .35s;
}
.paper.fade-out{
  opacity:0;transform:scale(0.97) translateY(6px);
}

/* Paper edge aging */
.paper::before{
  content:'';position:absolute;inset:0;
  border-radius:2px;
  background:linear-gradient(135deg, rgba(120,90,60,0.08) 0%, transparent 30%, transparent 70%, rgba(120,90,60,0.06) 100%);
  pointer-events:none;
}

/* ========== INDEX SEAL ========== */
.seal-top{
  position:absolute;top:-16px;left:50%;transform:translateX(-50%);
  width:60px;height:60px;
  background:radial-gradient(circle at 50% 40%, #8b2020 0%, #5a1212 70%, #3a0808 100%);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;color:#d4a060;font-weight:700;
  box-shadow:0 2px 12px rgba(100,20,0,0.5);
  border:1px solid rgba(180,100,50,0.3);
  z-index:3;
  letter-spacing:0.1em;
}

/* ========== STYLE BADGE ========== */
.style-badge{
  position:absolute;top:-10px;right:20px;z-index:3;
  font-size:0.6rem;letter-spacing:0.15em;
  color:rgba(100,70,50,0.4);
  background:rgba(200,180,155,0.3);
  padding:0.15rem 0.6rem;
  border-radius:1px;
}

/* ========== INSTRUCTION CONTENT ========== */
.instruction-content{position:relative;z-index:1;flex:1;display:flex;flex-direction:column}

.instruction-header{
  text-align:center;margin-bottom:1.2rem;
  font-size:clamp(1rem,2.5vw,1.3rem);
  font-weight:700;color:#3a2a1a;
  letter-spacing:0.5em;
}
.instruction-header .deco{
  display:block;margin-top:4px;
  font-size:0.7rem;letter-spacing:0.3em;color:#a08870;font-weight:400;
}

.instruction-body{
  flex:1;
  font-size:clamp(0.95rem,2.2vw,1.15rem);
  line-height:2;
  color:#3a3024;
  padding:0.4rem 0;
}
.instruction-body p{
  margin-bottom:0.8rem;
  text-indent:2em;
}

/* Short style */
.instruction-body.short-style{
  text-align:center;display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  padding:0.8rem 0.5rem;
}
.instruction-body.short-style .short-line{
  font-size:clamp(1.3rem,3.5vw,1.8rem);
  font-weight:700;color:#3a2a1a;letter-spacing:0.4em;
  line-height:1.8;text-indent:0;margin-bottom:0.3rem;
}
.instruction-body.short-style .short-sub{
  font-size:clamp(0.75rem,1.8vw,0.9rem);
  color:#7a6050;letter-spacing:0.2em;
  margin-top:0.4rem;text-indent:0;line-height:1.6;
}

/* List style */
.instruction-body.list-style .list-item{
  display:flex;gap:0.6rem;align-items:flex-start;
  margin-bottom:0.5rem;text-indent:0;
}
.instruction-body.list-style .list-num{
  color:#7a3020;font-weight:700;flex-shrink:0;
  min-width:1.4rem;text-align:right;
}

/* Triple style */
.instruction-body.triple-style{
  display:flex;flex-direction:column;justify-content:center;gap:0.3rem;
}
.instruction-body.triple-style .triple-line{
  text-align:center;text-indent:0;
  font-size:clamp(1rem,2.4vw,1.2rem);
  letter-spacing:0.3em;color:#4a3a2a;
  padding:0.3rem 0;
  border-bottom:1px dashed rgba(60,40,20,0.08);
}
.instruction-body.triple-style .triple-line:last-child{border-bottom:none}
.instruction-body.triple-style .triple-line .triple-mark{
  font-size:0.7rem;color:#9a8068;display:block;margin-top:0.1rem;
}

.instruction-footer{
  margin-top:auto;padding-top:1.2rem;
  display:flex;justify-content:space-between;align-items:flex-end;
  border-top:1px solid rgba(60,40,20,0.12);
}
.instruction-footer .mark{
  font-size:0.75rem;color:#8a7058;letter-spacing:0.1em;
}
.instruction-footer .seal-stamp{
  width:48px;height:48px;
  background:radial-gradient(circle at 50% 40%, #8b2020 0%, #5a1212 70%);
  border-radius:4px;opacity:0.7;
  display:flex;align-items:center;justify-content:center;
  font-size:0.6rem;color:#d4a060;writing-mode:vertical-lr;letter-spacing:0.2em;
  transform:rotate(-3deg);
  box-shadow:inset 0 0 8px rgba(0,0,0,0.3);
}

/* ========== CONTROLS ========== */
.controls{
  margin-top:1.5rem;display:flex;gap:0.8rem;justify-content:center;
  flex-wrap:wrap;
}
.btn{
  padding:0.7rem 2rem;
  background:linear-gradient(135deg, #3a2a1a 0%, #2a1a0a 100%);
  color:#d4c9b0;border:1px solid rgba(200,170,130,0.25);
  border-radius:2px;
  font-size:0.9rem;font-family:inherit;letter-spacing:0.15em;
  cursor:pointer;transition:all .3s;
}
.btn:hover{
  background:linear-gradient(135deg, #5a3a2a 0%, #3a2a1a 100%);
  border-color:rgba(200,170,130,0.4);
  transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,0.4);
}
.btn:active{transform:translateY(0)}
.btn-secondary{
  background:transparent;
  border-color:rgba(200,170,130,0.15);
  color:rgba(180,165,140,0.6);
}
.btn-secondary:hover{
  background:rgba(200,170,130,0.05);
  border-color:rgba(200,170,130,0.25);
  color:rgba(200,180,160,0.8);
}

/* ========== COUNTER ========== */
.counter{
  margin-top:0.8rem;font-size:0.75rem;color:rgba(180,165,140,0.35);
  letter-spacing:0.05em;
  text-align:center;
}

/* ========== FOOTER ========== */
footer{
  position:relative;z-index:2;width:100%;
  padding:1.5rem 1rem;text-align:center;
  font-size:0.65rem;color:rgba(180,165,140,0.2);letter-spacing:0.1em;
}

/* ========== RESPONSIVE ========== */
@media(max-width:480px){
  .paper{padding:2rem 1.2rem 1.5rem;min-height:350px}
  .instruction-body{font-size:0.95rem;line-height:1.9}
  .btn{padding:0.6rem 1.4rem;font-size:0.8rem}
  .style-tab{padding:0.3rem 0.6rem;font-size:0.7rem}
}

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:rgba(10,10,12,0.5)}
::-webkit-scrollbar-thumb{background:rgba(100,80,60,0.3);border-radius:2px}
</style>
</head>

  '找到一座桥，从桥下走而不是桥上。',
  '对着空椅子说话，直到你感觉到有人在听。',
  '将你的影子画下来，然后将画作烧掉。',
  '戴上一只不属于你的手套，走一公里。',
  '在钟声敲响时停下脚步，直到它完全停止。',
  '将一块石头放在路中央，不要告诉任何人为什么。',
];

// ============================================================
//  TRIPLE STYLE – 三行令
// ============================================================

// Triple templates: [line1, line2, line3, marks]
const TRIPLE_TEMPLATES = [
  { l1:'第一，去你从未去过的地方', l2:'第二，带回你从未拥有的东西', l3:'第三，成为你不曾想过的人', m1:'— 行 —', m2:'— 知 —', m3:'— 成 —' },
  { l1:'你所寻找的就在你身后', l2:'你所害怕的正在靠近', l3:'你所等待的永远不会来', m1:'— 寻 —', m2:'— 惧 —', m3:'— 等 —' },
  { l1:'闭上眼，看清面前的黑暗', l2:'张开手，握住虚空中的重量', l3:'迈开步，走进想象中的大门', m1:'— 见 —', m2:'— 触 —', m3:'— 入 —' },
  { l1:'在沉默中听见指令', l2:'在黑暗中看清道路', l3:'在孤独中完成使命', m1:'— 听 —', m2:'— 视 —', m3:'— 行 —' },
  { l1:'忘掉你来时的路', l2:'记住你路上的标记', l3:'忘记你看到的所有标记', m1:'— 忘 —', m2:'— 记 —', m3:'— 再忘 —' },
  { l1:'向东方走七步，停下', l2:'向西方走七步，跪下', l3:'向北方走七步，别停', m1:'— 东 —', m2:'— 西 —', m3:'— 北 —' },
];

// ============================================================
//  STYLE NAMES
// ============================================================

const STYLE_LABELS = {
  standard:'标准令', short:'短令', list:'列表令',
  triple:'三行令', omen:'谶言令', mixed:'混令',
};

// ============================================================
//  HELPERS
// ============================================================

function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}

// ============================================================
//  GENERATORS PER STYLE
// ============================================================

function genStandard(){
  const o    = pick(OPENINGS);
  const act  = pick(ACTIONS);
  const tgt  = pick(TARGETS);
  const per  = pick(PERSONS);
  const loc  = pick(LOCATIONS);
  const time = pick(TIMES);
  const cond = pick(CONDITIONS);
  const cons = pick(CONSEQUENCES);
  const clos = pick(CLOSINGS);
  const v = Math.random();

  let p1,p2,p3;
  if(v<0.33){
    p1 = `${o}${act}${loc}，向${per}索取${tgt}。`;
    p2 = `${time}前完成，${cond}。`;
    p3 = `${cons}。${clos}`;
  } else if(v<0.66){
    p1 = `${o}在${loc}寻找${per}，从其手中取得${tgt}。`;
    p2 = `限${time}，${cond}。`;
    p3 = `${cons}。${clos}`;
  } else {
    p1 = `${o}将${tgt}${act}至${loc}，交予${per}。`;
    p2 = `须在${time}抵达，${cond}。`;
    p3 = `${cons}。${clos}`;
  }
  return `<div class="instruction-body"><p>${p1}</p><p>${p2}</p><p>${p3}</p></div>`;
}

function genShort(){
  const main   = pick(SHORT_MAIN);
  const detail = pick(SHORT_DETAIL);
  return `<div class="instruction-body short-style">
    <div class="short-line">${main}</div>
    <div class="short-sub">${detail}</div>
  </div>`;
}

function genList(){
  const count = 3 + Math.floor(Math.random()*4); // 3-6 items
  const used = new Set();
  const items = [];
  while(items.length < count){
    const idx = Math.floor(Math.random() * LIST_ACTIONS.length);
    if(!used.has(idx)){ used.add(idx); items.push(LIST_ACTIONS[idx]) }
  }
  const cond = pick(CONDITIONS);
  const cons = pick(CONSEQUENCES);
  return `<div class="instruction-body list-style">
    ${items.map((t,i)=>`<div class="list-item"><span class="list-num">${i+1}.</span><span>${t}</span></div>`).join('')}
    <p style="margin-top:0.6rem;text-indent:0;font-size:0.85rem;color:#7a6050;">以上令条须同时执行——${cond}。<br>${cons}。</p>
  </div>`;
}

function genTriple(){
  const t = pick(TRIPLE_TEMPLATES);
  return `<div class="instruction-body triple-style">
    <div class="triple-line">${t.l1}<span class="triple-mark">${t.m1}</span></div>
    <div class="triple-line">${t.l2}<span class="triple-mark">${t.m2}</span></div>
    <div class="triple-line">${t.l3}<span class="triple-mark">${t.m3}</span></div>
  </div>`;
}

function genOmen(){
  const omen = pick(OMENS);
  const after = pick(OMEN_AFTERS);
  return `<div class="instruction-body short-style">
    <div class="short-line" style="font-size:clamp(1.1rem,2.8vw,1.4rem)">${omen}</div>
    <div class="short-sub" style="margin-top:0.8rem">${after}</div>
  </div>`;
}

function genMixed(){
  // 50% short, 20% standard, 15% triple, 15% omen
  const r = Math.random();
  if(r<0.50) return {html:genShort(), style:'short'};
  if(r<0.70) return {html:genStandard(), style:'standard'};
  if(r<0.85) return {html:genTriple(), style:'triple'};
  return {html:genOmen(), style:'omen'};
}

// ============================================================
//  RENDER
// ============================================================

const paper     = document.getElementById('paper');
const instEl    = document.getElementById('instruction');
const cntEl     = document.getElementById('counter');
const badgeEl   = document.getElementById('styleBadge');
let genCount    = 0;
let currentStyle = 'standard';

function renderIndex(style){
  style = style || currentStyle;
  currentStyle = style;

  let html, label;

  if(style === 'mixed'){
    const result = genMixed();
    html = result.html;
    label = '混令 · ' + STYLE_LABELS[result.style];
  } else {
    const generators = {
      standard: genStandard,
      short: genShort,
      list: genList,
      triple: genTriple,
      omen: genOmen,
    };
    html = generators[style]();
    label = STYLE_LABELS[style];
  }

  paper.classList.add('fade-out');

  setTimeout(()=>{
    instEl.innerHTML = `
      <div class="instruction-header">
        食 指 之 令
        <span class="deco">⋆ 谨遵指令之意 ⋆</span>
      </div>
      ${html}
      <div class="instruction-footer">
        <span class="mark">都市历 · 未知年 · 信纸编号 ${String(++genCount).padStart(4,'0')}</span>
        <div class="seal-stamp">食指</div>
      </div>
    `;
    badgeEl.textContent = '— ' + label + ' —';
    cntEl.textContent = `已降指令 ${genCount} 道 · 六种令式 · 可组合逾万种`;
    paper.classList.remove('fade-out');
  }, 280);
}

// ============================================================
//  COPY
// ============================================================

document.getElementById('copyBtn').addEventListener('click', async ()=>{
  const text = instEl.innerText;
  try{
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('copyBtn');
    const orig = btn.textContent;
    btn.textContent = '✓ 已复录';
    setTimeout(()=>btn.textContent = orig, 1200);
  }catch{
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  }
});

// ============================================================
//  STYLE TABS
// ============================================================

document.querySelectorAll('.style-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.style-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    renderIndex(tab.dataset.style);
  });
});

// ============================================================
//  EVENTS
// ============================================================

document.getElementById('generateBtn').addEventListener('click', ()=>renderIndex());
document.addEventListener('keydown', e=>{
  if(e.key===' '||e.key==='Space'){e.preventDefault(); renderIndex()}
});

// ============================================================
//  PARTICLES
// ============================================================

(function initParticles(){
  const field = document.getElementById('particles');
  for(let i=0;i<35;i++){
    const p = document.createElement('div'); p.className='particle';
    p.style.left   = Math.random()*100+'%';
    p.style.width  = p.style.height = (1+Math.random()*2)+'px';
    p.style.animationDuration = (12+Math.random()*25)+'s';
    p.style.animationDelay = (Math.random()*20)+'s';
    p.style.opacity = 0.15+Math.random()*0.25;
    field.appendChild(p);
  }
})();

// ============================================================
//  BOOT
// ============================================================

renderIndex();
</script>
</body>
</html>
